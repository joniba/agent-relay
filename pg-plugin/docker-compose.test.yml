# Local Postgres for agent-relay's Postgres-transport integration tests.
#
#   docker compose -f docker-compose.test.yml up -d
#   AGENT_RELAY_TEST_PG=1 \
#   AGENT_RELAY_TEST_PG_HOST=localhost AGENT_RELAY_TEST_PG_PORT=5433 \
#   AGENT_RELAY_TEST_PG_USER=postgres AGENT_RELAY_TEST_PG_PASSWORD=relaytest \
#   AGENT_RELAY_TEST_PG_DB=postgres \
#     node --test tests/postgres.integration.test.mjs
#   docker compose -f docker-compose.test.yml down
#
# The default `node --test` (no AGENT_RELAY_TEST_PG) does NOT need this — the
# integration tests skip without it.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: relaytest
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
